<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Perfume Store</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
font-size:24px;
}

.container{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.product{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#444;
}
</style>
</head>

<body>

<header>
Perfume Store
</header>

<div class="container">

<div class="product">
<img src="https://images.unsplash.com/photo-1594035910387-fea47794261f">
<h3>Tom Ford</h3>
<p>$120</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1615634260167-c8cdede054de">
<h3>Yves Saint Laurent</h3>
<p>$95</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1541643600914-78b084683601">
<h3>Spicebomb</h3>
<p>$110</p>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
