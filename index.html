<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GH Perfumes</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:black;
}

.logo{
font-size:26px;
font-weight:bold;
color:gold;
}

.cartbtn{
background:gold;
color:black;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* HERO */

.hero{
height:420px;
background:url("https://images.unsplash.com/photo-1592945403244-b3fbafd7f539") center/cover;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
}

/* SEARCH */

.search{
text-align:center;
margin:25px;
}

.search input{
padding:10px;
width:260px;
border-radius:8px;
border:none;
}

/* FILTER */

.filters{
text-align:center;
margin-bottom:20px;
}

.filters button{
margin:5px;
padding:8px 12px;
border:none;
cursor:pointer;
border-radius:6px;
background:#333;
color:white;
}

/* PRODUCTS */

.products{
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:gold;
margin:10px 0;
}

.rating{
color:gold;
}

button{
border:none;
padding:8px 12px;
margin:4px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.add{
background:white;
}

.buy{
background:gold;
}

/* CART */

.cartbox{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
overflow:auto;
}

.cartitem{
border-bottom:1px solid #333;
padding:10px 0;
}

/* CHECKOUT */

.checkout{
display:none;
padding:40px;
}

.checkout input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 20px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<nav>

<div class="logo">GH Perfumes</div>

<div class="cartbtn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

</nav>

<div class="hero">
Luxury Perfumes
</div>

<div class="search">
<input type="text" placeholder="Search perfume..." id="search" onkeyup="searchProduct()">
</div>

<div class="filters">

<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('men')">Men</button>
<button onclick="filterProducts('women')">Women</button>
<button onclick="filterProducts('arabic')">Arabic</button>

</div>

<section class="products">
<div class="grid" id="grid"></div>
</section>

<div class="cartbox" id="cartbox">

<h2>Your Cart</h2>

<div id="items"></div>

<button onclick="checkout()">Checkout</button>

</div>

<div class="checkout" id="checkoutPage">

<h2>Checkout</h2>

<input placeholder="Your Name">

<input placeholder="Phone Number">

<input placeholder="Address">

<button onclick="payVisa()">Pay with Visa</button>

<button onclick="cash()">Cash on Delivery</button>

</div>

<footer>
© 2026 GH Perfumes
</footer>

<a class="whatsapp" href="https://wa.me/201006290602">WhatsApp</a>

<script>

let cart=[]

let products=[

{name:"Dior Sauvage",price:390,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.31861.jpg"},
{name:"Bleu de Chanel",price:390,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.9099.jpg"},
{name:"Stronger With You",price:390,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.42303.jpg"},
{name:"Tom Ford Oud Wood",price:420,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.1825.jpg"},
{name:"1 Million",price:380,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.3747.jpg"},
{name:"Jean Paul Gaultier",price:380,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.430.jpg"},
{name:"Versace Eros",price:380,category:"men",img:"https://fimgs.net/mdimg/perfume/375x500.16657.jpg"},

{name:"Gucci Flora",price:420,category:"women",img:"https://fimgs.net/mdimg/perfume/375x500.10789.jpg"},
{name:"Libre YSL",price:390,category:"women",img:"https://fimgs.net/mdimg/perfume/375x500.56077.jpg"},
{name:"Jadore Dior",price:360,category:"women",img:"https://fimgs.net/mdimg/perfume/375x500.137.jpg"},
{name:"Kayali Marshmallow",price:350,category:"women",img:"https://fimgs.net/mdimg/perfume/375x500.67347.jpg"},
{name:"Yara Pink",price:320,category:"women",img:"https://fimgs.net/mdimg/perfume/375x500.78560.jpg"},

{name:"Khamrah Lattafa",price:170,category:"arabic",img:"https://fimgs.net/mdimg/perfume/375x500.75805.jpg"}

]

let grid=document.getElementById("grid")

products.forEach((p)=>{

grid.innerHTML+=`

<div class="card" data-category="${p.category}">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="rating">★★★★★</div>

<div class="price">${p.price} EGP</div>

<button class="add" onclick="add('${p.name}')">Add</button>

<button class="buy" onclick="buy('${p.name}')">Buy</button>

</div>

`

})

function add(product){

cart.push(product)

updateCart()

}

function remove(i){

cart.splice(i,1)

updateCart()

}

function updateCart(){

document.getElementById("count").innerText=cart.length

let html=""

cart.forEach((item,i)=>{

html+=`<div class="cartitem">${item} <button onclick="remove(${i})">X</button></div>`

})

document.getElementById("items").innerHTML=html

}

function toggleCart(){

let box=document.getElementById("cartbox")

box.style.right=(box.style.right=="0px")?"-350px":"0px"

}

function buy(product){

let phone="201006290602"

let message="Hello I want to order "+product

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url)

}

function checkout(){

document.querySelector(".products").style.display="none"

document.getElementById("checkoutPage").style.display="block"

}

function payVisa(){

window.open("PUT-YOUR-PAYMENT-LINK")

}

function cash(){

let phone="201006290602"

let message="Order: "+cart.join(",")

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url)

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.innerText.toLowerCase()

card.style.display=name.includes(input)?"block":"none"

})

}

function filterProducts(type){

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

if(type=="all"){

card.style.display="block"

}

else if(card.dataset.category==type){

card.style.display="block"

}

else{

card.style.display="none"

}

})

}

</script>

</body>
</html>
