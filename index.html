<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GH Perfume Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:black;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
color:gold;
font-weight:bold;
}

.cartbtn{
background:gold;
color:black;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* HERO */

.hero{
height:350px;
background:linear-gradient(to bottom,#000,#111);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
color:gold;
}

/* SEARCH */

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:250px;
border-radius:8px;
border:none;
}

/* PRODUCTS */

.products{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:gold;
margin:8px 0;
}

button{
border:none;
padding:8px 12px;
margin:4px;
cursor:pointer;
font-weight:bold;
border-radius:6px;
}

.add{
background:white;
}

.buy{
background:gold;
}

/* CART */

.cartbox{
position:fixed;
top:0;
right:-350px;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:.3s;
overflow:auto;
}

.cartitem{
border-bottom:1px solid #333;
padding:10px 0;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px 20px;
border-radius:30px;
color:white;
text-decoration:none;
font-weight:bold;
}

footer{
background:black;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<nav>

<div class="logo">GH Perfumes</div>

<div class="cartbtn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

</nav>

<div class="hero">
Luxury Perfumes
</div>

<div class="search">
<input type="text" placeholder="Search perfume..." id="search" onkeyup="searchProduct()">
</div>

<section class="products">
<div class="grid" id="grid"></div>
</section>

<div class="cartbox" id="cartbox">

<h2>Your Cart</h2>

<div id="items"></div>

<button onclick="cod()">Order Now</button>

</div>

<footer>
© 2026 GH Perfume Store
</footer>

<a class="whatsapp" href="https://wa.me/201006290602">WhatsApp</a>

<script>

let cart=[]

let products=[

{name:"Dior Sauvage",price:390},
{name:"Bleu de Chanel",price:390},
{name:"Stronger With You",price:390},
{name:"Tom Ford",price:390},
{name:"1 Million",price:380},
{name:"Jean Paul Gaultier",price:380},
{name:"Valentino",price:420},
{name:"Givenchy Gentleman",price:390},
{name:"Gucci Flora",price:420},
{name:"Prada",price:390},
{name:"Versace Eros",price:380},
{name:"Libre",price:390},
{name:"Jadore",price:360},
{name:"Kayali Marshmallow",price:350},
{name:"Khamrah",price:170}

]

let grid=document.getElementById("grid")

products.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="https://source.unsplash.com/300x300/?perfume">

<h3>${p.name}</h3>

<div class="price">${p.price} EGP</div>

<button class="add" onclick="add('${p.name}')">Add</button>

<button class="buy" onclick="order('${p.name}')">Buy</button>

</div>

`

})

function add(product){

cart.push(product)

updateCart()

}

function remove(i){

cart.splice(i,1)

updateCart()

}

function updateCart(){

document.getElementById("count").innerText=cart.length

let html=""

cart.forEach((item,i)=>{

html+=`<div class="cartitem">${item} <button onclick="remove(${i})">X</button></div>`

})

document.getElementById("items").innerHTML=html

}

function toggleCart(){

let box=document.getElementById("cartbox")

box.style.right=(box.style.right=="0px")?"-350px":"0px"

}

function order(product){

let phone="201006290602"

let message="Hello I want to order "+product

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url)

}

function cod(){

let phone="201006290602"

let message="Order: "+cart.join(",")

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

window.open(url)

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.innerText.toLowerCase()

card.style.display=name.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
